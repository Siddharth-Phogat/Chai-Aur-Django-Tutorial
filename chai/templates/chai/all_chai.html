{% extends "layout.html" %}

{% block title %}
Our Chai Collection
{% endblock title %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Our Chai Collection</h1>
        <p class="text-gray-300 text-lg">Discover our curated selection of premium chai varieties</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for chai in chais %}
        <div class="group bg-gradient-to-br from-emerald-900 to-emerald-800 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl hover:shadow-emerald-500/40 transition transform hover:-translate-y-2 duration-300">
            <div class="relative h-64 overflow-hidden bg-gradient-to-b from-emerald-700 to-emerald-900">
                <img class="w-full h-full object-cover group-hover:scale-110 transition duration-300" src="{{chai.image.url}}" alt="{{ chai.name }}">
            </div>
            <div class="p-6 text-center space-y-4">
                <h2 class="text-2xl font-bold text-white group-hover:text-lime-300 transition duration-300">{{ chai.name }}</h2>
                <p class="text-emerald-200 text-sm uppercase tracking-wider font-semibold">{{ chai.type }}</p>
                <a href="{% url 'chai_detail' chai.id %}" class="inline-block mt-4">
                    <button type="button" class="px-6 py-2 bg-gradient-to-r from-lime-600 to-lime-500 text-white font-bold rounded-lg hover:from-lime-500 hover:to-lime-400 focus:outline-none focus:ring-2 focus:ring-lime-400 focus:ring-offset-2 focus:ring-offset-emerald-900 transition transform hover:scale-105 duration-300">
                        View Details
                    </button>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock content %}
