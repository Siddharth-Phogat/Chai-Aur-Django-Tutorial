{% extends "layout.html" %}

{% block title %}
Home Page - Chai Aur Django
{% endblock title %}

{% block content %}
<div class="bg-gradient-to-b from-emerald-950 via-gray-800 to-gray-900 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
        <div class="text-center space-y-10">
            <h1 class="text-5xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-lime-300 to-emerald-400 drop-shadow-lg">
                🍵 Chai Aur Django
            </h1>
            <p class="text-xl md:text-2xl text-gray-300 max-w-2xl mx-auto leading-relaxed">
                Explore the finest collection of chai varieties from around the world
            </p>
            <div class="flex justify-center gap-4 pt-8">
                <a href="/chai/" class="inline-block px-10 py-4 bg-gradient-to-r from-emerald-500 to-lime-500 text-white font-bold rounded-lg hover:shadow-2xl hover:shadow-emerald-500/40 transition transform hover:scale-105 duration-300">
                    Explore Chai →
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
